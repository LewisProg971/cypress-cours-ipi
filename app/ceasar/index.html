<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caesar Cypher</title>
    <link rel="stylesheet" href="./main.css">
    <script src="./main.js" defer></script>
</head>
<body>
    <div class="card">
        <h1>Caesar Cypher</h1>
        <p class="subtitle">Vanilla JS</p>

        <div class="form-group">
            <label for="key">Cypher key</label>
            <input type="number" id="key" value="6">
        </div>

        <div class="form-group">
            <textarea id="text" rows="3">Hello World!</textarea>
        </div>

        <button id="cypher-btn">Cypher</button>

        
        <p id="output"></p>
    </div>
</body>
</html>
